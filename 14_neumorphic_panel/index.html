<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ömercan Sabun | Soft UI Panel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-panel">
        
        <!-- Header -->
        <header class="neo-header">
            <div class="neo-circle logo-btn">ÖS</div>
            <div class="status-indicator">
                <div class="led active"></div>
                System Active
            </div>
        </header>

        <!-- Body -->
        <div class="content-wrapper">
            <!-- Left Controls -->
            <div class="controls-panel neo-convex">
                <h3 class="neo-title">MODULES</h3>
                <button class="neo-btn neo-active">Profile</button>
                <button class="neo-btn">Projects</button>
                <button class="neo-btn">Contact</button>
            </div>

            <!-- Main Display -->
            <div class="display-panel neo-concave">
                <h1>ÖMERCAN SABUN</h1>
                <p class="subtitle">Cloud-Native Software Architect.</p>
                
                <div class="tech-slider neo-convex">
                    <div class="slider-track">
                        <div class="slider-thumb neo-btn"></div>
                    </div>
                </div>
                <p class="slider-label">Microservices Integration Level</p>

                <div class="stats-grid">
                    <div class="neo-card neo-convex">
                        <h4>DevAssist AI</h4>
                        <span>LLM / K8s</span>
                    </div>
                    <div class="neo-card neo-convex">
                        <h4>Fusion Banking</h4>
                        <span>Go / Kafka</span>
                    </div>
                    <div class="neo-card neo-convex">
                        <h4>AutoFinance</h4>
                        <span>C# / RAG</span>
                    </div>
                </div>
            </div>
            
            <!-- Right Dial -->
            <div class="dial-panel neo-convex">
                <div class="neo-dial">
                    <div class="dial-inner neo-concave">
                        <div class="dial-marker"></div>
                    </div>
                </div>
                <button class="neo-btn big-btn">ENGAGE</button>
            </div>
        </div>

    </div>
</body>
</html>
