<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ömercan Sabun | Cinematic Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Jost:wght@300;400&display=swap" rel="stylesheet">

<body>
    <nav class="fixed-nav">

    <!-- Horizontal scroll area mimicking an infinite gallery -->

            <section class="slide text-slide">

                    <h1>SOFTWARE<br>ARCHITECT</h1>

            <!-- Project 1 -->
            <section class="slide img-slide">
                <div class="img-wrapper"><img src="https://images.unsplash.com/photo-1627398225058-f4bc831e7e78?q=80&w=800&auto=format&fit=crop" alt="Abstract Code"></div>
                <div class="caption">01 / DEVASSIST AI</div>
            </section>

            <!-- Project 2 -->
            <section class="slide img-slide">
                <div class="img-wrapper"><img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=800&auto=format&fit=crop" alt="Server Data"></div>
                <div class="caption">02 / FUSION BANKING</div>
            </section>

            <!-- Project 3 -->
            <section class="slide img-slide">
                <div class="img-wrapper"><img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=800&auto=format&fit=crop" alt="Matrix Code"></div>
                <div class="caption">03 / AUTOFINANCE RAG</div>
            </section>

            <!-- Outro Slide -->
            <section class="slide text-slide end-slide">
                <div class="slide-content">
                    <h2>INITIATE<br>CONTACT</h2>
                    <a href="mailto:omercansabun@icloud.com" class="outline-btn">omercansabun@icloud.com</a>
                </div>
            </section>

        </div>
    </main>
</body>
</html>
