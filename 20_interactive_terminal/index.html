<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ömercan Sabun | Interactive Shell</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="terminal">
        <div id="output">
            <div class="line sys">OMERCAN_OS v2.0.26 initialized.</div>
            <div class="line sys">Type 'help' to see available commands.</div>
            <div class="line">----------------------------------------</div>
        </div>
        <div class="input-line">
            <span class="prompt">guest@omercan.dev:~$</span>
            <input type="text" id="cmd-input" autocomplete="off" autofocus>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
